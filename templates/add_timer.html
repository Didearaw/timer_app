<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить таймер</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Добавить новый таймер</h1>
        <a href="/" class="btn btn-secondary mb-3">← Назад</a>
        
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="builder_name" class="form-label">Имя строителя</label>
                        <input type="text" class="form-control" id="builder_name" name="builder_name" required>
                    </div>
                    <div class="mb-3">
                        <label for="start_datetime" class="form-label">Дата и время старта</label>
                        <input type="datetime-local" class="form-control" id="start_datetime" name="start_datetime" required>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="days" class="form-label">Дней</label>
                            <input type="number" class="form-control" id="days" name="days" value="0" min="0">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="hours" class="form-label">Часов</label>
                            <input type="number" class="form-control" id="hours" name="hours" value="0" min="0" max="23">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="minutes" class="form-label">Минут</label>
                            <input type="number" class="form-control" id="minutes" name="minutes" value="0" min="0" max="59">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
